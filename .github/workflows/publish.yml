name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        type: boolean
        default: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  publish:
    name: Build and Publish to NuGet
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Extract version from tag
      id: version
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ "${{ github.event.release.prerelease }}" == "true" ]; then
            echo "suffix=preview" >> $GITHUB_OUTPUT
          else
            echo "suffix=" >> $GITHUB_OUTPUT
          fi
        else
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          if [ "${{ inputs.prerelease }}" == "true" ]; then
            echo "suffix=preview" >> $GITHUB_OUTPUT
          else
            echo "suffix=" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Restore dependencies
      run: dotnet restore MapSharp.slnx

    - name: Build
      run: dotnet build MapSharp.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test MapSharp.slnx --configuration Release --no-build --verbosity normal

    - name: Pack Source Generator
      run: |
        if [ -n "${{ steps.version.outputs.suffix }}" ]; then
          dotnet pack MapSharp.SourceGenerator/MapSharp.SourceGenerator.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkgs \
            -p:PackageVersion=${{ steps.version.outputs.version }}-${{ steps.version.outputs.suffix }}
        else
          dotnet pack MapSharp.SourceGenerator/MapSharp.SourceGenerator.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkgs \
            -p:PackageVersion=${{ steps.version.outputs.version }}
        fi

    - name: Pack MapSharp
      run: |
        if [ -n "${{ steps.version.outputs.suffix }}" ]; then
          dotnet pack MapSharp/MapSharp.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkgs \
            -p:PackageVersion=${{ steps.version.outputs.version }}-${{ steps.version.outputs.suffix }}
        else
          dotnet pack MapSharp/MapSharp.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkgs \
            -p:PackageVersion=${{ steps.version.outputs.version }}
        fi

    - name: List packages
      run: ls -la ./nupkgs/

    - name: Publish to NuGet
      run: |
        for package in ./nupkgs/*.nupkg; do
          echo "Pushing $package"
          dotnet nuget push "$package" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        done

    - name: Upload packages as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages-${{ steps.version.outputs.version }}
        path: |
          ./nupkgs/*.nupkg
          ./nupkgs/*.snupkg
        retention-days: 90
