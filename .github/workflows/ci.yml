name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore MapSharp.slnx

    - name: Build
      run: dotnet build MapSharp.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test MapSharp.slnx --configuration Release --no-build --verbosity normal --logger trx --results-directory "TestResults-${{ matrix.os }}"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: TestResults-${{ matrix.os }}
        retention-days: 5

  pack:
    name: Create NuGet Package
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore MapSharp.slnx

    - name: Build
      run: dotnet build MapSharp.slnx --configuration Release --no-restore

    - name: Pack Source Generator
      run: dotnet pack MapSharp.SourceGenerator/MapSharp.SourceGenerator.csproj --configuration Release --no-build --output ./nupkgs

    - name: Pack MapSharp
      run: dotnet pack MapSharp/MapSharp.csproj --configuration Release --no-build --output ./nupkgs

    - name: Upload NuGet packages
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./nupkgs/*.nupkg
        retention-days: 30

    - name: Upload Symbol packages
      uses: actions/upload-artifact@v4
      with:
        name: symbol-packages
        path: ./nupkgs/*.snupkg
        retention-days: 30
        if-no-files-found: ignore
