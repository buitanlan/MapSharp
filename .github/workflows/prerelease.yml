name: Publish Prerelease

on:
  workflow_dispatch:
    inputs:
      suffix:
        description: 'Prerelease suffix (e.g., alpha, beta, rc.1)'
        required: false
        default: 'alpha'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  prerelease:
    name: Build and Publish Prerelease
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Generate version
      id: version
      run: |
        BASE_VERSION=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props || echo "1.0.0")
        SUFFIX="${{ inputs.suffix }}.$(date +%Y%m%d%H%M%S).$(git rev-parse --short HEAD)"
        echo "version=${BASE_VERSION}-${SUFFIX}" >> $GITHUB_OUTPUT
        echo "Generated version: ${BASE_VERSION}-${SUFFIX}"

    - name: Restore dependencies
      run: dotnet restore MapSharp.slnx

    - name: Build
      run: dotnet build MapSharp.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test MapSharp.slnx --configuration Release --no-build --verbosity normal

    - name: Pack MapSharp
      run: |
        dotnet pack MapSharp/MapSharp.csproj \
          --configuration Release \
          --no-build \
          --output ./nupkgs \
          -p:PackageVersion=${{ steps.version.outputs.version }}

    - name: List packages
      run: ls -la ./nupkgs/

    - name: Publish to NuGet (Prerelease)
      run: |
        dotnet nuget push ./nupkgs/MapSharp.*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Upload packages as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: prerelease-packages-${{ steps.version.outputs.version }}
        path: |
          ./nupkgs/*.nupkg
          ./nupkgs/*.snupkg
        retention-days: 30
